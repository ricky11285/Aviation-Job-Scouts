name: scout

on:
workflow_dispatch:

schedule:
- cron: '0 */6 * * *'

jobs:
scout:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install dependencies
    run: |
      pip install pandas beautifulsoup4 openpyxl playwright
      python -m playwright install chromium

  - name: Run scout
    run: python scout.py

  - name: Upload job tracker
    uses: actions/upload-artifact@v4
    with:
      name: dispatcher-job-results
      path: output/
```
