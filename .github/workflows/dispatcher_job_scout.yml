name: Dispatcher Job Scout

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install       - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Run scout
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          python scout.py

      - name: Commit updated tracker and database
        run: |
          git config user.name "dispatcher-job-scout"
          git config user.email "actions@github.com"
          git add jobs.db output/dispatcher_jobs_tracker.xlsx output/top_matches.txt || true
          git commit -m "Update dispatcher job scout results" || echo "No changes to commit"
          git push
