name: Dispatcher Job Scout

on:
schedule:
- cron: "0 */3 * * *"
workflow_dispatch:

permissions:
contents: write

jobs:
scout:
runs-on: ubuntu-latest

```
steps:
  - name: Check out repo
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies and Playwright
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install playwright
      playwright install --with-deps chromium

  - name: Run scout
    run: |
      python scout.py

  - name: Upload job tracker artifact
    uses: actions/upload-artifact@v4
    with:
      name: dispatcher-job-results
      path: output/

  - name: Send email with results
    uses: dawidd6/action-send-mail@v3
    with:
      server_address: smtp.gmail.com
      server_port: 465
      secure: true
      username: ${{ secrets.EMAIL_FROM }}
      password: ${{ secrets.EMAIL_PASSWORD }}
      subject: Dispatcher Scout Results
      to: ${{ secrets.EMAIL_TO }}
      from: ${{ secrets.EMAIL_FROM }}
      body: |
        Dispatcher scout completed successfully.

        Attached:
        - dispatcher_jobs_tracker.xlsx
        - top_matches.txt
        - recently_added.txt
      attachments: |
        output/dispatcher_jobs_tracker.xlsx
        output/top_matches.txt
        output/recently_added.txt
```
